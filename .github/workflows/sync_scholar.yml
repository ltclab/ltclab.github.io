name: Sync Publications OpenAlex
on:
  schedule:
    - cron: '0 0 * * *' # Runs every night at midnight
  workflow_dispatch: # Lets you click a button to sync manually

jobs:
  update-publications:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests pyyaml

      - name: Create Sync Script File
        run: |
          cat << 'EOF' > sync.py
          import os
          import requests
          import yaml
          import sys

          def format_apa_authors(authorships):
              apa_names = []
              # APA 7th says list up to 20 authors before using ellipses
              for auth in authorships[:20]:
                  full_name = auth.get("author", {}).get("display_name", "").strip()
                  if not full_name:
                      continue
                  
                  parts = full_name.split()
                  if len(parts) > 1:
                      # Assumes last word is the surname; converts preceding words to initials
                      surname = parts[-1]
                      # Insert space between initials to comply with APA style
                      initials_formatted = " ".join([f"{p[0]}." for p in parts[:-1]])
                      apa_names.append(f"{surname}, {initials_formatted}")
                  else:
                      apa_names.append(full_name)
              
              if not apa_names:
                  return "Unknown Authors"
                  
              if len(apa_names) == 1:
                  return apa_names[0]
              elif len(apa_names) == 2:
                  return f"{apa_names[0]}, & {apa_names[1]}"
              else:
                  return ", ".join(apa_names[:-1]) + f", & {apa_names[-1]}"

          # Load manual items if they exist to protect from OpenAlex identification gaps
          manual_data = []
          manual_path = "_data/manual_publications.yml"
          if os.path.exists(manual_path):
              with open(manual_path, "r") as f:
                  manual_data = yaml.safe_load(f) or []

          url = "https://api.openalex.org/works"
          params = {
              "filter": "author.id:A5061947416|A5093544766,publication_year:>2022",
              "sort": "publication_year:desc,publication_date:desc",
              "per_page": 100
          }

          response = requests.get(url, params=params, headers={"User-Agent": "mailto:lab@example.com"})
          if response.status_code != 200:
              sys.exit(1)
              
          results = response.json().get("results", [])
          api_data = []

          for work in results:
              title = work.get("title", "Untitled Work").strip(".")
              doi = work.get("doi") # OpenAlex natively returns the full https://doi.org/... string
              
              authors = format_apa_authors(work.get("authorships", []))
              
              location = work.get("primary_location", {}) or {}
              source = location.get("source", {}) or {}
              venue = source.get("display_name", "Journal/Conference")
              
              year = work.get("publication_year", "N/A")
              
              # Extract APA Bibliographic details
              biblio = work.get("biblio", {}) or {}
              volume = biblio.get("volume")
              issue = biblio.get("issue")
              
              # Construct page ranges clean
              first_p = biblio.get("first_page")
              last_p = biblio.get("last_page")
              pages = f"{first_p}–{last_p}" if first_p and last_p else first_p

              api_data.append({
                  "title": title,
                  "doi": doi if doi else None,
                  "authors": authors,
                  "venue": venue if venue else "Journal/Conference",
                  "year": str(year),
                  "volume": str(volume) if volume else None,
                  "issue": str(issue) if issue else None,
                  "pages": str(pages) if pages else None
              })

          # Combine files
          unsorted_data = manual_data + api_data

          # Sort by year in reverse chronological order (newest year down to oldest)
          # Using a fallback lambda approach ensures that string 'N/A' years don't break the integer sorts
          combined_data = sorted(
              unsorted_data, 
              key=lambda x: int(x['year']) if str(x['year']).isdigit() else 0, 
              reverse=True
          )

          os.makedirs("_data", exist_ok=True)
          with open("_data/scholar_publications.yml", "w") as f:
              yaml.dump(combined_data, f, default_flow_style=False, allow_unicode=True)
          print(f"SUCCESS: Compiled and sorted {len(combined_data)} total items.")
          EOF

      - name: Run Sync Script
        run: python sync.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "Scholar Sync Bot"
          git config --global user.email "bot@github.com"
          git add _data/scholar_publications.yml
          git diff --quiet && git diff --staged --quiet || (git commit -m "Sync Ming's papers with sorted reverse-chronological APA merge" && git push)